services:
  - type: web
    name: sistema-notas-frontend
    runtime: static
    repo: https://github.com/Deimer1991/ProyectoIntegradorFrontend
    rootDir: Practica
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sistemadenotasgraficos.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
